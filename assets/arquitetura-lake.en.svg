<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arwg" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
    <marker id="arwv" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7C3AED"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="640" fill="#ffffff"/>

  <!-- Title -->
  <text x="24" y="34" font-size="18" font-weight="700" fill="#0F1035">How data comes in, becomes a graph, and is served</text>
  <text x="24" y="56" font-size="12.5" fill="#64748b">Two ingestion paths → one knowledge graph → served over SQL and MCP</text>

  <!-- ============ LANE A: no lake, full ETL ============ -->
  <rect x="18" y="82" width="604" height="192" rx="14" fill="#FCFCFD" stroke="#CBD5E1" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="36" y="106" font-size="12.5" font-weight="700" fill="#3730A3">NO DATA LAKE</text>
  <text x="150" y="106" font-size="12" fill="#64748b">· Strattum runs the ETL (dlt → dbt/DuckDB)</text>

  <!-- Catalog pill -->
  <rect x="298" y="120" width="164" height="30" rx="8" fill="#F1F5F9" stroke="#E2E8F0"/>
  <text x="380" y="139" font-size="11" font-weight="600" fill="#475569" text-anchor="middle">PostgreSQL catalog</text>
  <text x="380" y="166" font-size="9.5" fill="#94a3b8" text-anchor="middle">snapshots · serializes commits</text>
  <line x1="380" y1="172" x2="470" y2="192" stroke="#CBD5E1" stroke-width="1.2" stroke-dasharray="4 3" fill="none"/>

  <!-- Chain -->
  <g>
    <rect x="38" y="196" width="118" height="58" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.3"/>
    <text x="97" y="221" font-size="13" font-weight="700" fill="#0F1035" text-anchor="middle">SOURCE</text>
    <text x="97" y="238" font-size="10" fill="#64748b" text-anchor="middle">SaaS · DB · API</text>

    <rect x="186" y="196" width="118" height="58" rx="10" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.3"/>
    <text x="245" y="230" font-size="13.5" font-weight="700" fill="#3730A3" text-anchor="middle">RAW</text>

    <rect x="334" y="196" width="118" height="58" rx="10" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.3"/>
    <text x="393" y="221" font-size="12" font-weight="700" fill="#3730A3" text-anchor="middle">ENRICHMENT</text>
    <text x="393" y="238" font-size="10" fill="#6366F1" text-anchor="middle">optional · AI</text>

    <rect x="482" y="196" width="118" height="58" rx="10" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.3"/>
    <text x="541" y="230" font-size="13.5" font-weight="700" fill="#3730A3" text-anchor="middle">CLEAN</text>
  </g>
  <!-- chain arrows -->
  <g font-size="9.5" fill="#64748b" text-anchor="middle">
    <line x1="158" y1="225" x2="183" y2="225" stroke="#64748b" stroke-width="1.4" marker-end="url(#arw)"/>
    <text x="171" y="216">dlt</text>
    <line x1="306" y1="225" x2="331" y2="225" stroke="#64748b" stroke-width="1.4" marker-end="url(#arw)"/>
    <text x="319" y="216">python</text>
    <line x1="454" y1="225" x2="479" y2="225" stroke="#64748b" stroke-width="1.4" marker-end="url(#arw)"/>
    <text x="467" y="216">dbt</text>
  </g>

  <!-- ============ LANE B: has lake, federation ============ -->
  <rect x="18" y="294" width="604" height="150" rx="14" fill="#FCFCFD" stroke="#CBD5E1" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="36" y="318" font-size="12.5" font-weight="700" fill="#059669">HAS A DATA LAKE / WAREHOUSE</text>
  <text x="256" y="318" font-size="12" fill="#64748b">· federation, zero copy (roadmap)</text>

  <rect x="38" y="350" width="186" height="66" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.3"/>
  <text x="131" y="376" font-size="11.5" font-weight="700" fill="#2563EB" text-anchor="middle">Snowflake · Databricks</text>
  <text x="131" y="394" font-size="11.5" font-weight="700" fill="#2563EB" text-anchor="middle">BigQuery · Redshift</text>

  <rect x="300" y="346" width="250" height="74" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.7"/>
  <text x="425" y="376" font-size="13.5" font-weight="700" fill="#047857" text-anchor="middle">DuckDB + ADBC</text>
  <text x="425" y="396" font-size="10.5" fill="#059669" text-anchor="middle">reads the warehouse in place — zero copy</text>

  <line x1="298" y1="383" x2="226" y2="383" stroke="#059669" stroke-width="1.5" marker-end="url(#arwg)"/>
  <text x="262" y="375" font-size="9.5" fill="#059669" text-anchor="middle">scans</text>

  <!-- ============ merge arrows to Memory Worker ============ -->
  <path d="M602,225 C640,225 655,232 686,235" stroke="#64748b" stroke-width="1.6" fill="none" marker-end="url(#arw)"/>
  <text x="645" y="219" font-size="10" font-weight="700" fill="#3730A3" text-anchor="middle">with ETL</text>
  <path d="M552,383 C620,383 640,270 686,250" stroke="#059669" stroke-width="1.6" fill="none" marker-end="url(#arwg)"/>
  <text x="622" y="330" font-size="10" font-weight="700" fill="#059669" text-anchor="middle">no ETL</text>

  <!-- ============ RIGHT STACK: ontology → worker → falkor → mcp ============ -->
  <rect x="700" y="116" width="222" height="50" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.4"/>
  <text x="811" y="138" font-size="12.5" font-weight="700" fill="#B45309" text-anchor="middle">Ontology</text>
  <text x="811" y="155" font-size="10" fill="#D97706" text-anchor="middle">graph_mapping.yaml</text>
  <line x1="811" y1="166" x2="811" y2="202" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arw)"/>
  <text x="811" y="187" font-size="9.5" fill="#94a3b8" text-anchor="middle">defines nodes/edges</text>

  <rect x="690" y="206" width="242" height="62" rx="10" fill="#0F1035"/>
  <text x="811" y="232" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">Memory Worker</text>
  <text x="811" y="250" font-size="10.5" fill="#CBD5E1" text-anchor="middle">DuckDB + Cypher</text>
  <line x1="811" y1="268" x2="811" y2="304" stroke="#64748b" stroke-width="1.5" marker-end="url(#arw)"/>
  <text x="811" y="290" font-size="9.5" fill="#64748b" text-anchor="middle">MERGE</text>

  <rect x="721" y="306" width="180" height="56" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="811" y="330" font-size="13" font-weight="700" fill="#047857" text-anchor="middle">FalkorDB</text>
  <text x="811" y="347" font-size="10" fill="#059669" text-anchor="middle">entity graph</text>
  <line x1="811" y1="362" x2="811" y2="398" stroke="#64748b" stroke-width="1.5" marker-end="url(#arw)"/>

  <rect x="690" y="400" width="242" height="62" rx="10" fill="#0F1035"/>
  <text x="811" y="426" font-size="12.5" font-weight="700" fill="#ffffff" text-anchor="middle">MCP · run_sql</text>
  <text x="811" y="444" font-size="10" fill="#CBD5E1" text-anchor="middle">served to LLMs &amp; apps</text>

  <!-- run_sql reads parquet directly -->
  <path d="M690,431 C660,431 620,300 602,244" stroke="#CBD5E1" stroke-width="1.3" stroke-dasharray="4 3" fill="none" marker-end="url(#arw)"/>
  <text x="648" y="360" font-size="9" fill="#94a3b8" text-anchor="middle" transform="rotate(-72 648 360)">run_sql reads the Parquet</text>

  <!-- run_sql also reads the federated lake (no-ETL path) — routed under lane B, no crossings -->
  <path d="M690,452 C620,492 520,486 470,424" stroke="#059669" stroke-width="1.3" stroke-dasharray="4 3" fill="none" marker-end="url(#arwg)"/>
  <text x="495" y="470" font-size="9" fill="#059669" text-anchor="middle">run_sql reads the federated lake</text>

  <!-- ============ ACL LANE: per-object permissions (ADR-019) ============ -->
  <rect x="18" y="500" width="604" height="108" rx="14" fill="#FCFCFD" stroke="#DDD6FE" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="36" y="524" font-size="12.5" font-weight="700" fill="#7C3AED">ACL — PER-OBJECT PERMISSIONS</text>
  <text x="256" y="524" font-size="11" fill="#64748b">· who can see what, extracted from BOTH paths (ADR-019)</text>

  <rect x="38" y="540" width="180" height="52" rx="10" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.4"/>
  <text x="128" y="562" font-size="12" font-weight="700" fill="#6D28D9" text-anchor="middle">ACL extraction</text>
  <text x="128" y="579" font-size="10" fill="#7C3AED" text-anchor="middle">Prefect · per object</text>

  <!-- feeds: both lanes (SOURCE with-ETL + federated warehouse) -->
  <path d="M38,240 L27,240 L27,566 L34,566" stroke="#A78BFA" stroke-width="1.3" stroke-dasharray="4 3" fill="none" marker-end="url(#arwv)"/>
  <path d="M38,404 L31,404 L31,552 L34,552" stroke="#A78BFA" stroke-width="1.3" stroke-dasharray="4 3" fill="none" marker-end="url(#arwv)"/>

  <line x1="218" y1="566" x2="264" y2="566" stroke="#8B5CF6" stroke-width="1.4" marker-end="url(#arwv)"/>
  <text x="241" y="558" font-size="9" fill="#94a3b8" text-anchor="middle">writes grants</text>

  <rect x="268" y="540" width="220" height="52" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.4"/>
  <text x="378" y="562" font-size="11.5" font-weight="700" fill="#475569" text-anchor="middle">PostgreSQL · auth.access_grant</text>
  <text x="378" y="579" font-size="9.5" fill="#94a3b8" text-anchor="middle">the same Postgres as the catalog</text>

  <!-- apply: a recurring process stamps acl_allow/acl_deny onto CLEAN -->
  <path d="M488,566 L575,566 L575,258" stroke="#8B5CF6" stroke-width="1.5" fill="none" marker-end="url(#arwv)"/>
  <text x="588" y="412" font-size="9" fill="#7C3AED" text-anchor="middle" transform="rotate(-90 588 412)">applies acl_allow / acl_deny to CLEAN — on every sync</text>
</svg>

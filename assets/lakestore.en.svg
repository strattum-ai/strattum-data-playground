<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="820" height="430" fill="#ffffff"/>

  <text x="24" y="32" font-size="17" font-weight="700" fill="#0F1035">LakeStore — one access point for the whole lake</text>
  <text x="24" y="53" font-size="12" fill="#64748b">Connectors and dbt write; memory-worker, catalog-api and MCP read — all through the same class.</text>

  <!-- writers (left) -->
  <text x="112" y="96" font-size="11" font-weight="700" fill="#3730A3" text-anchor="middle">WRITERS</text>
  <rect x="38" y="108" width="150" height="44" rx="9" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.3"/>
  <text x="113" y="135" font-size="12.5" font-weight="700" fill="#3730A3" text-anchor="middle">Connectors</text>
  <rect x="38" y="170" width="150" height="44" rx="9" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.3"/>
  <text x="113" y="197" font-size="12.5" font-weight="700" fill="#3730A3" text-anchor="middle">dbt</text>

  <!-- LakeStore hub (center) -->
  <rect x="322" y="104" width="176" height="150" rx="12" fill="#0F1035"/>
  <text x="410" y="150" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">LakeStore</text>
  <text x="410" y="171" font-size="10.5" fill="#CBD5E1" text-anchor="middle">strattum_core.lake</text>
  <line x1="345" y1="188" x2="475" y2="188" stroke="#334155" stroke-width="1"/>
  <text x="410" y="208" font-size="10.5" fill="#93C5FD" text-anchor="middle">the single</text>
  <text x="410" y="224" font-size="10.5" fill="#93C5FD" text-anchor="middle">access point</text>

  <!-- readers (right) -->
  <text x="703" y="80" font-size="11" font-weight="700" fill="#059669" text-anchor="middle">READERS</text>
  <rect x="620" y="92" width="168" height="40" rx="9" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.3"/>
  <text x="704" y="117" font-size="12" font-weight="700" fill="#047857" text-anchor="middle">memory-worker</text>
  <rect x="620" y="146" width="168" height="40" rx="9" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.3"/>
  <text x="704" y="171" font-size="12" font-weight="700" fill="#047857" text-anchor="middle">catalog-api</text>
  <rect x="620" y="200" width="168" height="40" rx="9" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.3"/>
  <text x="704" y="225" font-size="12" font-weight="700" fill="#047857" text-anchor="middle">skills-api · MCP</text>

  <!-- write arrows -->
  <line x1="190" y1="130" x2="320" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="252" y="132" font-size="9.5" fill="#64748b" text-anchor="middle">write</text>
  <line x1="190" y1="192" x2="320" y2="176" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="250" y="197" font-size="9.5" fill="#64748b" text-anchor="middle">read+write</text>

  <!-- read arrows -->
  <line x1="500" y1="150" x2="618" y2="112" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="500" y1="176" x2="618" y2="166" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="500" y1="204" x2="618" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="556" y="150" font-size="9.5" fill="#64748b" text-anchor="middle">read()</text>

  <!-- DuckLake (bottom) -->
  <rect x="300" y="322" width="220" height="82" rx="11" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.4"/>
  <text x="410" y="352" font-size="13.5" font-weight="700" fill="#B45309" text-anchor="middle">DuckLake</text>
  <text x="410" y="372" font-size="10" fill="#D97706" text-anchor="middle">Postgres catalog</text>
  <text x="410" y="388" font-size="10" fill="#D97706" text-anchor="middle">+ Parquet (S3 / MinIO)</text>

  <!-- attach arrow (bidirectional) -->
  <line x1="410" y1="254" x2="410" y2="320" stroke="#64748b" stroke-width="1.6" marker-start="url(#a)" marker-end="url(#a)"/>
  <rect x="382" y="278" width="56" height="19" rx="9.5" fill="#ffffff"/>
  <text x="410" y="291" font-size="9.5" font-weight="700" fill="#475569" text-anchor="middle">ATTACH</text>
</svg>

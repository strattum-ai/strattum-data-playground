<svg width="100%" viewBox="0 0 800 500" role="img" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
<title>Strattum — fluxo de dados: hoje, amanhã (lake aberto) e federação</title>
<desc>Fluxo fonte para RAW para CLEAN para FalkorDB. Ingestao via dlt (connectorx / delta-rs) + dbt (DuckDB), validada. Federacao le o lake do cliente via DuckDB scanners ou Trino, nao validada.</desc>

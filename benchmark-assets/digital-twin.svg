<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="30" y="34" font-size="17" font-weight="700" fill="var(--text-primary, #0f172a)">Digital twin — um contrato e suas ligações</text>
  <text x="30" y="56" font-size="12.5" fill="var(--text-secondary, #64748b)">Sub-grafo real do FalkorDB: 1 contrato (Mongo) conecta suas duas partes (Postgres) e o produto (Mongo)</text>

  <!-- edges (drawn first, under the nodes) -->
  <line x1="360" y1="235" x2="205" y2="150" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="360" y1="265" x2="205" y2="352" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="500" y1="250" x2="575" y2="250" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- edge labels -->
  <g font-size="10.5" font-weight="700" fill="#475569">
    <rect x="238" y="176" width="94" height="19" rx="9.5" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="285" y="189" text-anchor="middle">PROCESSANTE</text>
    <rect x="240" y="300" width="90" height="19" rx="9.5" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="285" y="313" text-anchor="middle">PROCESSADO</text>
    <rect x="512" y="228" width="52" height="19" rx="9.5" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="538" y="241" text-anchor="middle">SOBRE</text>
  </g>

  <!-- Contract (center, amber) -->
  <g>
    <rect x="360" y="212" width="140" height="76" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="1.6"/>
    <rect x="360" y="212" width="140" height="24" rx="12" fill="#d97706"/>
    <rect x="360" y="224" width="140" height="12" fill="#d97706"/>
    <text x="430" y="229" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">CONTRACT</text>
    <text x="430" y="256" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Contrato 95152</text>
    <text x="430" y="275" text-anchor="middle" font-size="11.5" fill="#92400e">encerrado · R$ 42.933</text>
  </g>

  <!-- Processante user (top-left, blue) -->
  <g>
    <rect x="60" y="112" width="145" height="72" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6"/>
    <rect x="60" y="112" width="145" height="24" rx="12" fill="#2563eb"/>
    <rect x="60" y="124" width="145" height="12" fill="#2563eb"/>
    <text x="132" y="129" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">USER · processante</text>
    <text x="132" y="157" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Usuário 400774</text>
    <text x="132" y="175" text-anchor="middle" font-size="11" fill="#1d4ed8">postgres · id 400774</text>
  </g>

  <!-- Processado user (bottom-left, blue) -->
  <g>
    <rect x="60" y="316" width="145" height="72" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6"/>
    <rect x="60" y="316" width="145" height="24" rx="12" fill="#2563eb"/>
    <rect x="60" y="328" width="145" height="12" fill="#2563eb"/>
    <text x="132" y="333" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">USER · processado</text>
    <text x="132" y="361" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Usuário 5093</text>
    <text x="132" y="379" text-anchor="middle" font-size="11" fill="#1d4ed8">postgres · id 5093</text>
  </g>

  <!-- Product (right, green) -->
  <g>
    <rect x="578" y="214" width="145" height="72" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.6"/>
    <rect x="578" y="214" width="145" height="24" rx="12" fill="#16a34a"/>
    <rect x="578" y="226" width="145" height="12" fill="#16a34a"/>
    <text x="650" y="231" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">PRODUCT</text>
    <text x="650" y="259" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Produto 54</text>
    <text x="650" y="277" text-anchor="middle" font-size="11" fill="#15803d">mongo · product_id 54</text>
  </g>
</svg>
